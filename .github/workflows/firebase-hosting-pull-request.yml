name: Deploy to Firebase Hosting preview channel on PR

on:
  pull_request:

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  build_and_preview:
    # No desplegar previews desde forks — el secret no está disponible allí.
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    name: Build & deploy preview channel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_APP_MALETINES_UCP }}
          projectId: app-maletines-ucp
